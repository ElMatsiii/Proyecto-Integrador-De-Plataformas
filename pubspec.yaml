name: hawaii_app
description: App móvil para el sistema académico Hawaii - UCN
 
publish_to: 'none'
 
version: 1.0.0+1
 
environment:
  sdk: '>=3.2.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
 
  # HTTP & Networking
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
 
  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4
 
  # Routing
  go_router: ^13.2.0
 
  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
 
  # UI utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
 
  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
 
  mobile_scanner: ^5.2.3
 
  url_launcher: ^6.3.0
 
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
 
  # Autenticación con cuenta de Google del dispositivo
  google_sign_in: ^7.2.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.9
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/ucn_logo_3x.png"
 
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/